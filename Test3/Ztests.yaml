ifx_w_lu2.x: {from_template: TEMPLATE_test}
ifx_w_lu2_o3.x: {from_template: TEMPLATE_test}
ifx_w_lu4.x: {from_template: TEMPLATE_test}
ifx_w_lu8.x: {from_template: TEMPLATE_test}

gpp.x: {from_template: TEMPLATE_test}
